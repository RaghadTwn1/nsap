<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول | نِصاب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

:root{

--gold:#C9A84C;
--gold2:#E8C96A;

--bg:#F8F6F2;
--bg2:#F3EEE6;

--card:#FFFFFF;

--text:#2E2B26;

--muted:#7C756C;

--line:#E8E1D5;

}

html{
scroll-behavior:smooth;
}

body{

background:linear-gradient(135deg,var(--bg),var(--bg2));

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

position:relative;

color:var(--text);

}

/* الخلفية */

body::before{

content:"";

position:absolute;

width:550px;

height:550px;

border-radius:50%;

background:radial-gradient(circle,
rgba(201,168,76,.18),
transparent 70%);

top:-180px;

right:-150px;

animation:move1 8s ease-in-out infinite;

}

body::after{

content:"";

position:absolute;

width:350px;

height:350px;

border-radius:50%;

background:radial-gradient(circle,
rgba(201,168,76,.12),
transparent 70%);

bottom:-120px;

left:-100px;

animation:move2 10s ease-in-out infinite;

}

@keyframes move1{

50%{

transform:translateY(30px);

}

}

@keyframes move2{

50%{

transform:translateY(-30px);

}

}

.login-card{

width:430px;

background:rgba(255,255,255,.82);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.9);

border-radius:24px;

padding:45px;

box-shadow:0 20px 60px rgba(0,0,0,.08);

position:relative;

z-index:10;

animation:show .7s;

}

@keyframes show{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.logo{

text-align:center;

font-size:42px;

font-weight:900;

background:linear-gradient(135deg,var(--gold),var(--gold2));

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:10px;

}

.subtitle{

text-align:center;

font-size:15px;

color:var(--muted);

margin-bottom:35px;

}.input-box{

margin-bottom:22px;

}

.input-box label{

display:block;

margin-bottom:8px;

font-size:14px;

font-weight:700;

color:var(--text);

}

.input-box input{

width:100%;

padding:16px;

border-radius:14px;

border:1px solid var(--line);

background:white;

font-size:15px;

outline:none;

transition:.3s;

}

.input-box input:focus{

border-color:var(--gold);

box-shadow:0 0 0 4px rgba(201,168,76,.15);

}

.btn-login{

width:100%;

padding:16px;

margin-top:10px;

border:none;

border-radius:14px;

background:linear-gradient(135deg,var(--gold),var(--gold2));

color:white;

font-size:17px;

font-weight:800;

cursor:pointer;

transition:.3s;

box-shadow:0 15px 30px rgba(201,168,76,.28);

}

.btn-login:hover{

transform:translateY(-3px);

box-shadow:0 20px 40px rgba(201,168,76,.38);

}

.create-account{

margin-top:22px;

text-align:center;

font-size:15px;

color:var(--muted);

}

.create-account a{

text-decoration:none;

color:var(--gold);

font-weight:800;

}

.back-home{

display:block;

text-align:center;

margin-top:18px;

text-decoration:none;

color:#777;

font-size:14px;

transition:.3s;

}

.back-home:hover{

color:var(--gold);

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

نِصاب

</div>

<div class="subtitle">

سجلي الدخول لإدارة ذهبك وحساب زكاته

</div>

<form>

<div class="input-box">

<label>

رقم الجوال

</label>

<input type="tel" placeholder="05xxxxxxxx">

</div>

<div class="input-box">

<label>

كلمة المرور

</label>

<input type="password" placeholder="••••••••">

</div>

<button class="btn-login" type="button">

تسجيل الدخول

</button>

<div class="create-account">

ليس لديك حساب؟

<a href="#">

إنشاء حساب

</a>

</div>

<a class="back-home" href="1login.html">

← العودة للواجهة الرئيسية

</a></form>

</div>

<script>

document.querySelector(".btn-login").addEventListener("click",function(){

const phone=document.querySelector('input[type="tel"]').value.trim();

const password=document.querySelector('input[type="password"]').value.trim();

if(phone===""||password===""){

alert("يرجى إدخال رقم الجوال وكلمة المرور");

return;

}

/* مؤقتاً إلى أن نسوي النظام */

window.location.href="dashboard.html";

});

</script>

</body>

</html>
